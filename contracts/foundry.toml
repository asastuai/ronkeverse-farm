[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
ronin = "${RONIN_RPC_URL}"
saigon = "${SAIGON_RPC_URL}"

[etherscan]
ronin = { key = "${SOURCIFY_KEY}", url = "https://sourcify.roninchain.com/server", chain = 2020 }
saigon = { key = "${SOURCIFY_KEY}", url = "https://sourcify.roninchain.com/server", chain = 202601 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
